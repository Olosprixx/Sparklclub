<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Выбор серии</title>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #f0e6ff; display: flex; min-height: 100vh; }
    .menu-toggle { position: fixed; top: 15px; left: 15px; background: #ff758f; color: white; border: none; border-radius: 8px; padding: 10px 15px; font-size: 20px; cursor: pointer; z-index: 1000; }
    .sidebar { width: 280px; background: #ffffff; position: fixed; top: 0; left: 0; height: 100vh; z-index: 999; transform: translateX(-100%); transition: transform 0.3s ease; padding: 30px 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }
    .sidebar.open { transform: translateX(0); }
    .nav-link { display: block; padding: 15px 20px; background: #fff0f3; color: #ff477e; text-decoration: none; font-weight: bold; border-radius: 12px; }
    .main-content { flex-grow: 1; padding: 80px 20px; display: flex; flex-direction: column; align-items: center; }
    .episode-list { display: flex; flex-direction: column; gap: 15px; max-width: 400px; width: 100%; }
    .episode-btn { display: block; text-align: center; padding: 20px; background: white; color: #ff477e; text-decoration: none; font-weight: bold; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-size: 18px; transition: all 0.2s; }
    .episode-btn:hover { background: #ff477e; color: white; transform: scale(1.03); }
  </style>
</head>
<body>
  <button class="menu-toggle" id="menuBtn">☰ Меню</button>
  <nav class="sidebar" id="sidebar">
    <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
    <a href="seasons.html" class="nav-link">СЕЗОНЫ</a>
    <a href="characters.html" class="nav-link">ПЕРСОНАЖИ</a>
    <a href="contacts.html" class="nav-link">КОНТАКТЫ</a>
  </nav>
  <main class="main-content">
    <h1>1 Сезон — Выберите серию</h1>
    <div class="episode-list">
      <a href="comic.html" class="episode-btn">Серия 1: Добро пожаловать в Алфею!</a>
      <a href="#" class="episode-btn" style="opacity: 0.5;">Серия 2 (В разработке)</a>
    </div>
  </main>
  <script>
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    menuBtn.addEventListener('click', (e) => { e.stopPropagation(); sidebar.classList.toggle('open'); });
    document.addEventListener('click', (e) => { if (!sidebar.contains(e.target)) sidebar.classList.remove('open'); });
  </script>
</body>
</html>
