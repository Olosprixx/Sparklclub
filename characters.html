<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Персонажи</title>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #ffe5ec; display: flex; min-height: 100vh; }
    .menu-toggle { position: fixed; top: 15px; left: 15px; background: #ff758f; color: white; border: none; border-radius: 8px; padding: 10px 15px; font-size: 20px; cursor: pointer; z-index: 1000; }
    .sidebar { width: 280px; background: #ffffff; position: fixed; top: 0; left: 0; height: 100vh; z-index: 999; transform: translateX(-100%); transition: transform 0.3s ease; padding: 30px 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }
    .sidebar.open { transform: translateX(0); }
    .nav-link { display: block; padding: 15px 20px; background: #fff0f3; color: #ff477e; text-decoration: none; font-weight: bold; border-radius: 12px; }
    .main-content { flex-grow: 1; padding: 80px 20px 40px 20px; display: flex; flex-direction: column; align-items: center; }
    .char-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 600px; width: 100%; text-align: center; margin-bottom: 25px; }
    .char-images { display: flex; gap: 15px; justify-content: center; margin-bottom: 15px; }
    .char-images img { width: 45%; max-width: 200px; border-radius: 10px; height: auto; }
    .char-desc { font-size: 16px; color: #555; line-height: 1.6; }
  </style>
</head>
<body>
  <button class="menu-toggle" id="menuBtn">☰ Меню</button>
  <nav class="sidebar" id="sidebar">
    <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
    <a href="seasons.html" class="nav-link">СЕЗОНЫ</a>
    <a href="characters.html" class="nav-link active">ПЕРСОНАЖИ</a>
    <a href="contacts.html" class="nav-link">КОНТАКТЫ</a>
  </nav>
  <main class="main-content">
    <h1>Персонажи</h1>
    <div class="char-card">
      <div class="char-images">
        <img src="Рейчал_обычная.jpg">
      </div>
      <h2>Рейчел Свайт(Рей)</h2>
      <p class="char-desc">Рейчел - наша главная героиня! С самого рождения она воспитывалась в детском доме "Искорка". Её сила - четыре стихии: вода, огонь, земля, воздух. </p>
    </div>
  </main>
  <script>
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    menuBtn.addEventListener('click', (e) => { e.stopPropagation(); sidebar.classList.toggle('open'); });
    document.addEventListener('click', (e) => { if (!sidebar.contains(e.target)) sidebar.classList.remove('open'); });
  </script>
</body>
</html>
