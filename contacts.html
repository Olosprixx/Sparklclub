<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты</title>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #ffe5ec; display: flex; min-height: 100vh; }
    
    /* Кнопка меню ☰ */
    .menu-toggle { position: fixed; top: 15px; left: 15px; background: #ff758f; color: white; border: none; border-radius: 8px; padding: 10px 15px; font-size: 20px; cursor: pointer; z-index: 1000; }
    
    /* Боковое меню */
    .sidebar { width: 280px; background: #ffffff; position: fixed; top: 0; left: 0; height: 100vh; z-index: 999; transform: translateX(-100%); transition: transform 0.3s ease; padding: 30px 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }
    .sidebar.open { transform: translateX(0); }
    .nav-link { display: block; padding: 15px 20px; background: #fff0f3; color: #ff477e; text-decoration: none; font-weight: bold; border-radius: 12px; }
    
    /* Главный контент */
    .main-content { flex-grow: 1; padding: 80px 20px 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    /* Блок контактов */
    .contacts-card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 500px; width: 100%; text-align: center; }
    .contacts-card h1 { color: #333333; font-size: 32px; margin-bottom: 40px; }
    
    /* Стильные кнопки для соцсетей */
    .contact-button { display: block; padding: 20px; margin: 15px 0; border-radius: 15px; font-size: 24px; font-weight: bold; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }
    .contact-button:hover { transform: scale(1.03); }
    
    /* Стиль для ВК */
    .vk-btn { background-color: #0077ff; color: white; box-shadow: 0 4px 15px rgba(0, 119, 255, 0.3); }
    
    /* Стиль для TikTok */
    .tiktok-btn { background-color: #000000; color: white; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); }
  </style>
</head>
<body>

  <button class="menu-toggle" id="menuBtn">☰ Меню</button>

  <nav class="sidebar" id="sidebar">
    <a href="index.html" class="nav-link">ГЛАВНАЯ</a>
    <a href="seasons.html" class="nav-link">СЕЗОНЫ</a>
    <a href="characters.html" class="nav-link">ПЕРСОНАЖИ</a>
    <a href="contacts.html" class="nav-link active">КОНТАКТЫ</a>
  </nav>

  <main class="main-content">
    <div class="contacts-card">
      <h1>Контакты</h1>
      
      <a href="https://vk.com/olosprixxx" target="_blank" class="contact-button vk-btn">ВК</a>
      <a href="https://www.tiktok.com/@olosprixxx?_r=1&_t=ZT-97QNVueFJxl" target="_blank" class="contact-button tiktok-btn">Tik Tok</a>
    </div>
  </main>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    menuBtn.addEventListener('click', (e) => { e.stopPropagation(); sidebar.classList.toggle('open'); });
    document.addEventListener('click', (e) => { if (!sidebar.contains(e.target)) sidebar.classList.remove('open'); });
  </script>

</body>
</html>
