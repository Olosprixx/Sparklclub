<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Winx Фан-Комикс — Главная</title>
  <style>
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #ffe5ec 0%, #f0e6ff 100%); display: flex; min-height: 100vh; }
    .menu-toggle { display: none; position: fixed; top: 15px; left: 15px; background: #ff758f; color: white; border: none; border-radius: 8px; padding: 10px 15px; font-size: 20px; cursor: pointer; z-index: 1000; }
    .sidebar { width: 280px; background: #ffffff; box-shadow: 4px 0 15px rgba(0,0,0,0.05); padding: 30px 20px; display: flex; flex-direction: column; gap: 15px; flex-shrink: 0; transition: transform 0.3s ease; }
    .sidebar h2 { color: #ff758f; text-align: center; margin-bottom: 20px; }
    .nav-link { display: block; padding: 15px 20px; background: #fff0f3; color: #ff477e; text-decoration: none; font-weight: bold; border-radius: 12px; transition: all 0.2s; }
    .nav-link:hover, .nav-link.active { background: #ff477e; color: white; transform: translateX(5px); }
    .main-content { flex-grow: 1; padding: 40px; display: flex; align-items: center; justify-content: center; }
    .banner-box { max-width: 900px; width: 95%; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; margin: 0 auto; }
    
    max-width: 768px {
      .menu-toggle { display: block; }
      .sidebar { 
        position: fixed; 
        top: 0; 
        left: 0; 
        height: 100vh; 
        z-index: 999; 
        transform: translateX(-100%);
        width: 100%;       
        max-width: 100%;   
        box-sizing: border-box;
      }
      .sidebar.open { transform: translateX(0); }
      .main-content { padding: 80px 20px 20px 20px; }
    }
  </style>
</head>
<body>
  <button class="menu-toggle" id="menuBtn">☰</button>
  <nav class="sidebar" id="sidebar">
    <h2>КЛУБ ВИНКС</h2>
    <a href="index.html" class="nav-link active">ГЛАВНАЯ</a>
    <a href="seasons.html" class="nav-link">СЕЗОНЫ</a>
    <a href="characters.html" class="nav-link">ПЕРСОНАЖИ</a>
    <a href="contacts.html" class="nav-link">КОНТАКТЫ</a>
  </nav>
  <main class="main-content">
    <div class="banner-box">
      <picture>
        <source media="(max-width: 768px)" srcset="banner_mobile.jpg">
        <img src="Picsart_26-06-22_18-52-19-833.jpg" alt="Баннер" style="width:100%; display:block;">
      </picture>
    </div>
  </main>
  <script>
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    menuBtn.addEventListener('click', () => sidebar.classList.toggle('open'));
  </script>
</body>
</html>
